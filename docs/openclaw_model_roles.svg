<svg viewBox="0 0 780 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>OpenClaw-RL Personal Agent 各模型角色与替代方案</title>
<defs>
  <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#666666"/>
  </marker>
  <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#e05a5a"/>
  </marker>
</defs>

<!-- Background -->
<rect width="780" height="520" fill="#ffffff"/>

<!-- TITLE -->
<text x="390" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111111" font-family="sans-serif">OpenClaw-RL Personal Agent — 模型角色 &amp; 替代方案</text>

<!-- TRAINING LOOP ZONE -->
<rect x="16" y="44" width="748" height="290" rx="6" fill="none" stroke="#dddddd" stroke-width="1.5" stroke-dasharray="6,4"/>
<text x="30" y="62" font-size="11" fill="#888888" font-family="sans-serif">训练循环（Training Loop）</text>

<!-- SIMULATOR BOX -->
<rect x="36" y="74" width="148" height="72" rx="6" fill="#fff8e1" stroke="#f59e0b" stroke-width="1.8"/>
<text x="110" y="96" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e" font-family="sans-serif">Simulator</text>
<text x="110" y="112" text-anchor="middle" font-size="10" fill="#92400e" font-family="sans-serif">论文: GPT-4.1</text>
<text x="110" y="126" text-anchor="middle" font-size="10" fill="#92400e" font-family="sans-serif">替代: Qwen3-32B</text>

<!-- POLICY SERVER BOX -->
<rect x="296" y="74" width="188" height="72" rx="6" fill="#e8f5e9" stroke="#4caf50" stroke-width="2.5"/>
<text x="390" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#1b5e20" font-family="sans-serif">Policy Model ★</text>
<text x="390" y="112" text-anchor="middle" font-size="10" fill="#1b5e20" font-family="sans-serif">Qwen3-4B-Thinking-2507</text>
<text x="390" y="126" text-anchor="middle" font-size="10" fill="#1b5e20" font-family="sans-serif">SGLang port 30000  /  Megatron</text>

<!-- PRM BOX -->
<rect x="596" y="74" width="148" height="72" rx="6" fill="#fce4ec" stroke="#e91e63" stroke-width="1.8"/>
<text x="670" y="96" text-anchor="middle" font-size="12" font-weight="600" fill="#880e4f" font-family="sans-serif">PRM Judge</text>
<text x="670" y="112" text-anchor="middle" font-size="10" fill="#880e4f" font-family="sans-serif">Qwen3-4B</text>
<text x="670" y="126" text-anchor="middle" font-size="10" fill="#880e4f" font-family="sans-serif">训练信号打分</text>

<!-- Simulator -> Policy -->
<line x1="184" y1="110" x2="294" y2="110" stroke="#666666" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="239" y="104" text-anchor="middle" font-size="9" fill="#666666" font-family="sans-serif">请求</text>

<!-- Policy -> PRM -->
<line x1="484" y1="110" x2="594" y2="110" stroke="#666666" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="539" y="104" text-anchor="middle" font-size="9" fill="#666666" font-family="sans-serif">(action, next_state)</text>

<!-- PRM -> Reward -->
<line x1="670" y1="146" x2="670" y2="192" stroke="#e91e63" stroke-width="1.5" marker-end="url(#arr-red)"/>

<!-- REWARD BOX -->
<rect x="596" y="192" width="148" height="52" rx="6" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5"/>
<text x="670" y="213" text-anchor="middle" font-size="11" font-weight="600" fill="#880e4f" font-family="sans-serif">奖励信号</text>
<text x="670" y="230" text-anchor="middle" font-size="10" fill="#880e4f" font-family="sans-serif">r ∈ {+1, −1, 0}</text>

<!-- Reward -> Trainer -->
<line x1="596" y1="218" x2="490" y2="255" stroke="#e91e63" stroke-width="1.5" marker-end="url(#arr-red)"/>

<!-- TRAINER BOX -->
<rect x="246" y="232" width="244" height="72" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.8"/>
<text x="368" y="254" text-anchor="middle" font-size="12" font-weight="600" fill="#0d47a1" font-family="sans-serif">Trainer (Megatron)</text>
<text x="368" y="270" text-anchor="middle" font-size="10" fill="#0d47a1" font-family="sans-serif">GRPO + OPD 梯度更新</text>
<text x="368" y="285" text-anchor="middle" font-size="10" fill="#0d47a1" font-family="sans-serif">更新 Policy 权重</text>

<!-- Trainer -> Policy (weight update) -->
<path d="M368,232 Q200,200 296,146" stroke="#1976d2" stroke-width="1.5" fill="none" marker-end="url(#arr)" stroke-dasharray="5,3"/>
<text x="230" y="196" text-anchor="middle" font-size="9" fill="#1976d2" font-family="sans-serif">更新权重</text>

<!-- Simulator reaction arrow back -->
<path d="M390,146 Q390,170 184,170 Q110,170 110,146" stroke="#666666" stroke-width="1.5" fill="none" marker-end="url(#arr)" stroke-dasharray="5,3"/>
<text x="253" y="183" text-anchor="middle" font-size="9" fill="#666666" font-family="sans-serif">回复 → Simulator 继续对话</text>

<!-- SEPARATOR LINE -->
<line x1="16" y1="348" x2="764" y2="348" stroke="#dddddd" stroke-width="1" stroke-dasharray="4,3"/>

<!-- EVALUATION ZONE -->
<text x="30" y="368" font-size="11" fill="#888888" font-family="sans-serif">评估（Evaluation Only — 与训练无关）</text>

<!-- EVALUATOR BOX -->
<rect x="36" y="380" width="148" height="72" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.8"/>
<text x="110" y="402" text-anchor="middle" font-size="12" font-weight="600" fill="#4a148c" font-family="sans-serif">Evaluator</text>
<text x="110" y="418" text-anchor="middle" font-size="10" fill="#4a148c" font-family="sans-serif">代码默认: GPT-4o</text>
<text x="110" y="432" text-anchor="middle" font-size="10" fill="#4a148c" font-family="sans-serif">替代: Qwen3-32B</text>

<!-- Evaluator -> Policy -->
<line x1="184" y1="416" x2="294" y2="416" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="239" y="410" text-anchor="middle" font-size="9" fill="#9c27b0" font-family="sans-serif">测试请求</text>

<!-- POLICY eval box -->
<rect x="296" y="380" width="188" height="72" rx="6" fill="#e8f5e9" stroke="#4caf50" stroke-width="2.5"/>
<text x="390" y="402" text-anchor="middle" font-size="12" font-weight="700" fill="#1b5e20" font-family="sans-serif">Policy Model ★</text>
<text x="390" y="418" text-anchor="middle" font-size="10" fill="#1b5e20" font-family="sans-serif">turn_type="side"</text>
<text x="390" y="434" text-anchor="middle" font-size="10" fill="#1b5e20" font-family="sans-serif">不产生训练数据</text>

<!-- Policy -> Score -->
<line x1="484" y1="416" x2="574" y2="416" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- SCORE BOX -->
<rect x="574" y="380" width="170" height="72" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
<text x="659" y="402" text-anchor="middle" font-size="12" font-weight="600" fill="#4a148c" font-family="sans-serif">个性化得分</text>
<text x="659" y="418" text-anchor="middle" font-size="10" fill="#4a148c" font-family="sans-serif">Student/Teacher 风格</text>
<text x="659" y="434" text-anchor="middle" font-size="10" fill="#4a148c" font-family="sans-serif">→ Table 3 的数值</text>

<!-- LEGEND -->
<rect x="16" y="468" width="748" height="44" rx="4" fill="#f8f8f8" stroke="#dddddd" stroke-width="1"/>
<rect x="28" y="480" width="12" height="12" fill="#fff8e1" stroke="#f59e0b" stroke-width="1.5" rx="2"/>
<text x="46" y="491" font-size="10" fill="#666666" font-family="sans-serif">替代点（GPT-4.1/4o → Qwen3-32B）</text>
<rect x="228" y="480" width="12" height="12" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="2"/>
<text x="246" y="491" font-size="10" fill="#666666" font-family="sans-serif">最终产出的模型（被训练）</text>
<rect x="428" y="480" width="12" height="12" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5" rx="2"/>
<text x="446" y="491" font-size="10" fill="#666666" font-family="sans-serif">核心训练信号来源（不替代）</text>
<rect x="628" y="480" width="12" height="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="2"/>
<text x="646" y="491" font-size="10" fill="#666666" font-family="sans-serif">Megatron（不替代）</text>
</svg>
